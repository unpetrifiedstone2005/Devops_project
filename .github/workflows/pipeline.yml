name: DevOps CI Pipeline
on: [push] # Trigger on every code commit

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3 # Pull code into runner
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Execute Test Suite
        # Updated to find tests in the subfolder
        run: python -m pytest tests/unit/ 
        
      - name: Verify Generator Execution
        # Updated to point to the new location of app.json
        run: python src/netgen.py infrastructure/kubernetes/app.json