name: DevOps CI Pipeline

on: [push, pull_request]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx  # httpx is useful for API testing

      - name: Lint Code (Style Check)
        # Checks for syntax errors and undefined names
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Execute Test Suite
        # Runs unit tests for logic and integration tests for the FastAPI endpoints
        run: python -m pytest src/tests/

      - name: Verify Docker Build
        # We use a generic tag name 'policy-api-test' for the image
        # Ensure the context (.) and Dockerfile path are correct
        run: docker build -t policy-api-test -f infrastructure/docker/Dockerfile .

      - name: Validate Docker Compose Configuration
        # Validates that the orchestration file is syntactically correct
        run: docker compose -f infrastructure/docker/docker-compose.yml config