name: DevOps CI Pipeline

on: [push, pull_request]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest  # Adding a linter for better marks

      - name: Lint code (Style Check)
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Execute Test Suite
        # This now tests both your logic and your API endpoints
        run: python -m pytest src/tests/

      - name: Verify Docker Build
        # This ensures your Dockerfile isn't broken before you even try to run it
        run: docker build -t netgen-test -f infrastructure/docker/Dockerfile .